<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>ai gaane – Loka Ascension Studio</title>
    <style>
        body { margin: 0; overflow: hidden; font-family: 'Segoe UI', monospace; background: #000; color: #ccffcc; }
        #ui { position: absolute; bottom: 20px; left: 0; right: 0; text-align: center; z-index: 20; pointer-events: none; background: rgba(0,0,0,0.7); backdrop-filter: blur(10px); padding: 15px; border-radius: 30px; margin: 20px; border: 1px solid #0f0; }
        .hud { position: absolute; top: 20px; left: 20px; background: rgba(0,0,0,0.8); padding: 15px; border-radius: 15px; border-left: 5px solid #0f0; font-size: 14px; z-index: 20; pointer-events: none; font-family: monospace; line-height: 1.6; }
        button { pointer-events: auto; background: #0f0; color: #000; border: none; padding: 12px 25px; margin: 5px; border-radius: 40px; font-weight: bold; cursor: pointer; font-family: monospace; transition: 0.3s; }
        button:hover { background: #fff; transform: translateY(-2px); box-shadow: 0 0 15px #0f0; }
        #auto-btn { background: #ffaa44; }
        #message { position: absolute; top: 45%; left: 50%; transform: translate(-50%, -50%); font-size: 4rem; font-weight: bold; text-shadow: 0 0 30px #0f0; opacity: 0; transition: opacity 0.4s; text-align: center; z-index: 30; pointer-events: none; color: #fff; }
        #moksha { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: white; display: none; justify-content: center; align-items: center; z-index: 1000; color: black; font-size: 6rem; font-weight: bold; }
    </style>
</head>
<body>
    <div class="hud">
        🌀 LOKA: <span id="lokaVal">1</span> / 14<br>
        🔊 FREQ: <span id="freqVal">432</span> Hz (<span id="ratioVal">1:1</span>)<br>
        ✨ RAGA: <span id="ragaName">Bhairav (Sa)</span>
    </div>
    
    <div id="message"></div>

    <div id="ui">
        <div style="margin-bottom: 10px;">⚛️ QUANTATECH PRODUCTION STUDIO ⚛️</div>

        <div style="margin-bottom: 15px;">
            <label for="raga-picker" style="font-size: 12px; display: block; margin-bottom: 5px;">🕉️ SELECT VIBRATION</label>
            <select id="raga-picker" style="background: #111; color: #0f0; border: 1px solid #0f0; padding: 10px; border-radius: 10px; width: 200px; cursor: pointer; outline: none;">
                <option value="" disabled selected>Loading Ragas...</option>
            </select>
        </div>

        <button id="ascendBtn">⬆️ MANUAL ASCEND (SPACE)</button>
        <button id="auto-btn">⚡ AUTO-RITUAL (14 LOKAS)</button>
        <button id="exportBtn" style="background:#44aaff;">📜 EXPORT AKASHIC LOG</button>
    </div>

    <div id="shruti-container" style="position: absolute; bottom: 20px; right: 20px; display: grid; grid-template-columns: repeat(11, 1fr); gap: 5px; width: 300px;">
        <script>
            const container = document.getElementById('shruti-container');
            for(let i=1; i<=22; i++) {
                const btn = document.createElement('button');
                btn.innerText = i;
                btn.title = SHRUTI_NAMES[i-1];
                btn.style.padding = "5px";
                btn.style.fontSize = "10px";
                btn.style.background = "#222";
                btn.style.color = "#0f0";
                btn.style.border = "1px solid #0f0";
                btn.onclick = () => playShruti(i);
                container.appendChild(btn);
            }
        </script>
    </div>

    <div id="moksha">✨ MOKSHA ✨</div>

    <script type="module">
        import * as THREE from 'https://unpkg.com/three@0.128.0/build/three.module.js';

        // --- QUANTATECH RATIOS (432 Hz Base) ---
        const LOKA_DATA = {
            1: { ratio: 1.0, raga: "Bhairav", note: "Sa", fraction: "1:1" },
            2: { ratio: 1.125, raga: "Yaman", note: "Re", fraction: "9:8" },
            3: { ratio: 1.25, raga: "Bhopali", note: "Ga", fraction: "5:4" },
            4: { ratio: 1.333, raga: "Bhairavi", note: "Ma", fraction: "4:3" },
            5: { ratio: 1.5, raga: "Todi", note: "Pa", fraction: "3:2" },
            6: { ratio: 1.666, raga: "Marwa", note: "Dha", fraction: "5:3" },
            7: { ratio: 1.875, raga: "Poorvi", note: "Ni", fraction: "15:8" },
            8: { ratio: 2.0, raga: "Atala", note: "Sa+", fraction: "2:1" },
            9: { ratio: 2.25, raga: "Vitala", note: "Re+", fraction: "9:4" },
            10: { ratio: 2.5, raga: "Sutala", note: "Ga+", fraction: "5:2" },
            11: { ratio: 2.666, raga: "Talatala", note: "Ma+", fraction: "8:3" },
            12: { ratio: 3.0, raga: "Mahatala", note: "Pa+", fraction: "3:1" },
            13: { ratio: 3.333, raga: "Rasatala", note: "Dha+", fraction: "10:3" },
            14: { ratio: 3.75, raga: "Patala", note: "Ni+", fraction: "15:4" }
        };

        // 22 Shruti Ratio Map
        const SHRUTI_MAP = {
            1: 1.0,        // Sa
            2: 1.0125,     // Sa+
            3: 1.0535,     // re
            4: 1.0666,     // re+
            5: 1.1111,     // Re
            6: 1.125,      // Re+
            7: 1.1851,     // ga
            8: 1.2,        // ga+
            9: 1.25,       // Ga
            10: 1.2656,    // Ga+
            11: 1.3333,    // Ma
            12: 1.35,      // Ma+
            13: 1.4063,    // MA
            14: 1.4222,    // MA+
            15: 1.5,       // Pa
            16: 1.5187,    // Pa+
            17: 1.5802,    // dha
            18: 1.6,       // dha+
            19: 1.6666,    // Dha
            20: 1.6875,    // Dha+
            21: 1.7777,    // ni
            22: 1.875      // Ni
        };

        const SHRUTI_NAMES = [
            "Kshanti", "Diptimati", "Ayata", "Rati", "Krodha", "Prasanni", "Sandipini", "Alapini",
            "Madanti", "Rohini", "Ramdasi", "Kumudvati", "Vijay", "Nand", "Pushti",
            "Shukti", "Veda", "Dayavati", "Aditi", "Nandi", "Viswambhari", "Ramapriya"
        ];

        // --- STATE ---
        let loka = 1, journey = [], audioOn = false, auto = false;
        let ctx, mainOsc, tanpura, bass;
        let tanpuraOscs = []; // additional multi-oscillator tanpura drone
        // Reverb nodes
        let convolver, reverbGain, reverbWet = 0.25;

        // --- THREE.JS SCENE ---
        const scene = new THREE.Scene();
        const camera = new THREE.PerspectiveCamera(50, window.innerWidth/window.innerHeight, 0.1, 1000);
        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        document.body.appendChild(renderer.domElement);

        const orb = new THREE.Mesh(new THREE.IcosahedronGeometry(1.5, 2), new THREE.MeshStandardMaterial({ color: 0x00ff88, wireframe: true, emissive: 0x00ff44 }));
        scene.add(orb);
        scene.add(new THREE.PointLight(0x00ff88, 2, 50));
        camera.position.z = 8;

        const stars = new THREE.Points(new THREE.BufferGeometry(), new THREE.PointsMaterial({ color: 0xffffff, size: 0.1 }));
        const starPos = [];
        for(let i=0; i<1000; i++) starPos.push((Math.random()-0.5)*100, (Math.random()-0.5)*100, (Math.random()-0.5)*100);
        stars.geometry.setAttribute('position', new THREE.Float32BufferAttribute(starPos, 3));
        scene.add(stars);

        // Particle effects
        const particles = new THREE.Points(new THREE.BufferGeometry(), new THREE.PointsMaterial({ color: 0xffaa00, size: 0.05 }));
        const particlePos = [];
        const particleVel = [];
        let particleSpeed = 0.01;
        for(let i=0; i<500; i++) {
            particlePos.push(0,0,0);
            particleVel.push((Math.random()-0.5)*particleSpeed, (Math.random()-0.5)*particleSpeed, (Math.random()-0.5)*particleSpeed);
        }
        particles.geometry.setAttribute('position', new THREE.Float32BufferAttribute(particlePos, 3));
        scene.add(particles);

        // --- AUDIO ---
        function initAudio() {
            ctx = new (window.AudioContext || window.webkitAudioContext)();
            // init reverb chain
            initReverb();
            const createDrone = (f, g, type='sine') => {
                let o = ctx.createOscillator(); let gn = ctx.createGain();
                o.type = type; o.frequency.value = f; gn.gain.value = g;
                // route to dry and wet (convolver)
                o.connect(gn);
                gn.connect(ctx.destination);
                if (convolver) gn.connect(convolver);
                o.start();
                return {o, gn};
            };
            mainOsc = createDrone(432, 0.1);
            tanpura = createDrone(648, 0.05); // Pure 5th
            bass = createDrone(216, 0.04);    // Lower Octave
            audioOn = true;
        }

        function ascend() {
            if(loka >= 14) { triggerMoksha(); return; }
            loka++;
            const d = LOKA_DATA[loka];
            const f = 432 * d.ratio;
            particleSpeed = (f / 432) * 0.02;
            
            // Audio Glide
            [mainOsc, tanpura, bass].forEach((osc, i) => {
                const mult = [1, 1.5, 0.5][i];
                osc.o.frequency.setTargetAtTime(f * mult, ctx.currentTime, 0.15);
            });

            // UI
            document.getElementById('lokaVal').innerText = loka;
            document.getElementById('freqVal').innerText = Math.round(f);
            document.getElementById('ratioVal').innerText = d.fraction;
            document.getElementById('ragaName').innerText = `${d.raga} (${d.note})`;
            
            showMessage(`✨ ${d.note} ✨<br><small>${d.raga}</small>`);

            journey.push({ loka, raga: d.raga, hz: f });
            orb.scale.setScalar(1.2); setTimeout(()=> orb.scale.setScalar(1), 300);
        }

        function triggerMoksha() {
            document.getElementById('moksha').style.display = 'flex';
            [mainOsc, tanpura, bass].forEach(osc => osc.gn.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + 3));
            saveLog();
        }

        /**
         * Plays a specific Shruti frequency
         * @param {number} shrutiNumber - 1 to 22
         */
        function playShruti(shrutiNumber) {
            if (!audioOn) initAudio();
            
            const ratio = SHRUTI_MAP[shrutiNumber];
            const targetFreq = 432 * ratio;
            
            // Smooth transition to the microtone
            mainOsc.o.frequency.exponentialRampToValueAtTime(targetFreq, ctx.currentTime + 0.5);
            
            // UI Update
            document.getElementById('freqVal').innerText = targetFreq.toFixed(2);
            showMessage(`Shruti ${shrutiNumber}: ${targetFreq.toFixed(2)} Hz`);
        }

        function showMessage(text) {
            const msg = document.getElementById('message');
            msg.innerHTML = text;
            msg.style.opacity = 1;
            setTimeout(() => msg.style.opacity = 0, 1500);
        }

        function saveLog() {
            const blob = new Blob([JSON.stringify(journey, null, 2)], {type: 'application/json'});
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a'); a.href = url; a.download = `akashic_record.json`; a.click();
        }

        // --- CONTROLS ---
        document.body.onclick = () => { if(!audioOn) initAudio(); };
        document.getElementById('ascendBtn').onclick = ascend;
        document.getElementById('auto-btn').onclick = () => {
            if(!audioOn) initAudio();
            document.getElementById('auto-btn').innerText = "RITUAL ACTIVE...";
            setInterval(ascend, 4000);
        };
        document.getElementById('exportBtn').onclick = saveLog;
        window.onkeydown = (e) => { if(e.code === 'Space') ascend(); };

        // --- RAGA PICKER (loads ragas.json and applies vibration) ---
        const ragaPicker = document.getElementById('raga-picker');

        async function initRagaPicker() {
            try {
                const response = await fetch('./ragas.json');
                const data = await response.json();

                ragaPicker.innerHTML = '';
                data.ragas.forEach((raga, index) => {
                    const opt = document.createElement('option');
                    opt.value = index;
                    opt.textContent = raga.name;
                    ragaPicker.appendChild(opt);
                });

                ragaPicker.onchange = (e) => {
                    const selected = data.ragas[e.target.value];
                    applyRagaVibration(selected);
                };
            } catch (err) {
                console.error('Akashic Link Error:', err);
                ragaPicker.innerHTML = '<option>Error Loading</option>';
            }
        }

        function applyRagaVibration(raga) {
            if (!raga) return;
            if(!audioOn) initAudio();

            const baseFreq = 432 * (raga.ratios && raga.ratios.length ? raga.ratios[0] : 1.0);
            if (mainOsc && mainOsc.o && ctx) {
                mainOsc.o.frequency.exponentialRampToValueAtTime(baseFreq, ctx.currentTime + 2);
            }

            // Update HUD
            document.getElementById('ragaName').innerText = raga.name;
            document.getElementById('freqVal').innerText = Math.round(baseFreq);

            // Change orb color based on Raga time/mood
            const colors = { 'Morning': 0xffaa00, 'Night': 0x4400ff, 'Monsoon': 0x00aaff };
            const color = colors[raga.time] || 0x00ff88;
            if (orb && orb.material) {
                orb.material.color.setHex(color);
                if (orb.material.emissive) orb.material.emissive.setHex(color);
            }
            // update tanpura to match selected raga base
            startTanpura(432 * (raga.ratios && raga.ratios.length ? raga.ratios[0] : 1.0));
        }

        initRagaPicker();

        // --- TANPURA (multi-oscillator drone) ---
        function startTanpura(baseFreq) {
            // stop previous oscillators
            tanpuraOscs.forEach(o => {
                try { o.stop(); } catch (e) {}
            });
            tanpuraOscs = [];

            // Traditional 'Pa-Sa-Sa-Sa' pattern (approximate multipliers)
            const harmonics = [0.75, 1.0, 1.0, 0.5];
            harmonics.forEach(mult => {
                const osc = ctx.createOscillator();
                const g = ctx.createGain();
                osc.type = 'sine';
                osc.frequency.value = baseFreq * mult;
                g.gain.value = 0.02;
                osc.connect(g);
                g.connect(ctx.destination);
                if (convolver) g.connect(convolver);
                osc.start();
                // keep references so we can stop later
                tanpuraOscs.push({osc, g});
            });
        }

        // --- REVERB / CONVOLVER ---
        function createImpulseResponse(seconds = 3, decay = 2.0) {
            const rate = ctx.sampleRate;
            const length = rate * seconds;
            const ir = ctx.createBuffer(2, length, rate);
            for (let ch = 0; ch < 2; ch++) {
                const channel = ir.getChannelData(ch);
                for (let i = 0; i < length; i++) {
                    channel[i] = (Math.random() * 2 - 1) * Math.pow(1 - i / length, decay);
                }
            }
            return ir;
        }

        function initReverb() {
            if (!ctx) return;
            convolver = ctx.createConvolver();
            convolver.buffer = createImpulseResponse(3, 2.0);
            reverbGain = ctx.createGain();
            reverbGain.gain.value = reverbWet;
            convolver.connect(reverbGain);
            reverbGain.connect(ctx.destination);
        }

        function animate() {
            requestAnimationFrame(animate);
            orb.rotation.y += 0.01;
            stars.rotation.z += 0.001;

            // Update particles
            const pos = particles.geometry.attributes.position.array;
            for(let i=0; i<pos.length; i+=3){
                pos[i] += particleVel[i];
                pos[i+1] += particleVel[i+1];
                pos[i+2] += particleVel[i+2];
                const dist = Math.sqrt(pos[i]**2 + pos[i+1]**2 + pos[i+2]**2);
                if(dist > 8){
                    pos[i] = 0;
                    pos[i+1] = 0;
                    pos[i+2] = 0;
                    particleVel[i] = (Math.random()-0.5)*particleSpeed;
                    particleVel[i+1] = (Math.random()-0.5)*particleSpeed;
                    particleVel[i+2] = (Math.random()-0.5)*particleSpeed;
                }
            }
            particles.geometry.attributes.position.needsUpdate = true;

            renderer.render(scene, camera);
        }
        animate();
    </script>
</body>
</html>
